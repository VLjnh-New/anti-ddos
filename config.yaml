# ───────────────────────────────────────────────────────────────
#  Mini Shield — Config tối ưu cho REST API (LauNa)
#  Đã tắt các tính năng gây false-positive với bot/script clients
# ───────────────────────────────────────────────────────────────

proxy:
  port: 8080
  upstream: "https://sex.launa.rf.gd"   # ← ĐỔI: URL LauNa của bạn
  trustProxy: true                            # đọc IP thật qua CF
  proxyTimeout: 1200000
  # 2 phút cho AI streaming

dashboard:
  port: 5000
  username: "admin"
  password: "ĐỔI-MẬT-KHẨU-MẠNH-TẠI-ĐÂY"      # ← ĐỔI ngay

demoBackend:
  enabled: false

# ─── Rate limit: TẮT ──────────────────────────────────────────
# Lý do: Cloudflare đứng trước → Mini Shield thấy IP CF, không
# rate-limit đúng được. Đã có ddos.js trong LauNa lo việc này.
rateLimit:
  enabled: false
  windowMs: 1000
  maxRequests: 30
  burst: 60

# ─── Auto-ban: TẮT ────────────────────────────────────────────
# LauNa đã có cơ chế ban riêng (data/block/listIP.json),
# tránh 2 tầng ban xung đột nhau khó debug.
ban:
  enabled: false
  maxViolations: 5
  durationMs: 600000

# ─── WAF: BẬT nhưng chỉ LOG, KHÔNG chặn ──────────────────────
# Lý do: API nhận prompt AI, share-file content, URL có ký tự lạ
# → blockOnMatch=true sẽ chặn nhầm rất nhiều request hợp lệ.
# Đặt blockOnMatch=false để chỉ ghi log, bạn xem dashboard để
# theo dõi traffic đáng ngờ rồi quyết định ban thủ công.
waf:
  enabled: true
  blockOnMatch: false
  maxBodyBytes: 0          # 0 = không kiểm tra body (cho upload audio/ảnh lớn)

# ─── Bot detect: TẮT ──────────────────────────────────────────
# LauNa được gọi từ axios, python-requests, okhttp, Telegram bot…
# UA của các thư viện này nằm trong "known bad" → bị chặn nhầm.
botDetect:
  enabled: false
  blockEmptyUA: false
  blockKnownBadUA: false

# ─── JS PoW challenge: TẮT ────────────────────────────────────
# Bot/mobile app không có JS engine → không giải được → 403 vĩnh viễn.
challenge:
  enabled: false
  difficulty: 4
  cookieName: "ms_pow"
  cookieTTLms: 3600000
  triggerWhenSuspicious: false

# ─── White / Blacklist ────────────────────────────────────────
whitelistIps:
  # - "1.2.3.4"           # IP server bot Telegram của bạn
  # - "5.6.7.0/24"        # IP range của VPS

blacklistIps: []          # ban thủ công IP xấu phát hiện qua dashboard

logging:
  level: "info"
